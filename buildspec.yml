version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9        # ← 3.8 → 3.9 minimum
    commands:
      - echo Installing dependencies...
      - pip install --upgrade pip                    # ← upgrade pip
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo Pre-build phase completed!

  build:
    commands:
      - echo Running tests with pytest...
      - mkdir -p reports                             # ← crée le dossier
      - pytest --junitxml=reports/test_results.xml --tb=short  # ← bon chemin

  post_build:
    commands:
      - echo Build completed successfully!

artifacts:
  files:
    - '**/*'
  base-directory: .

reports:
  pytest_reports:
    files:
      - reports/test_results.xml                    # ← cohérent avec build
    discard-paths: yes